name: Playwright Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    # ✅ Inject GitHub Secrets into environment
    env:
      VALID_PASSWORD: ${{ secrets.VALID_PASSWORD }}
      INVALID_PASSWORD: ${{ secrets.INVALID_PASSWORD }}
      EMPTY_PASSWORD: ${{ secrets.EMPTY_PASSWORD }}

    steps:
      # Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      # Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-playwright python-dotenv pytest-html
          python -m playwright install --with-deps

      # Run tests (cross-browser)
      - name: Run Playwright tests
        run: |
          pytest -v \
          --browser chromium \
          --browser firefox \
          --browser webkit \
          --html=report.html \
          --self-contained-html \
          --tracing on

      # Upload HTML report
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: report.html